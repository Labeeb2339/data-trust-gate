<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="790" viewBox="0 0 1500 790" role="img" aria-labelledby="title desc">
  <title id="title">DataTrust Gate fixed detector regression coverage</title>
  <desc id="desc">Fifteen expected findings across eleven detector categories are matched in ten maintained synthetic fixture cases. There are zero unexpected findings, zero missed expected findings, and zero of ten clean-control rows flagged.</desc>
  <defs>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.5" fill="#29484a"/></pattern>
  </defs>
  <style>
    .title{font:500 38px Inter,Segoe UI,sans-serif;fill:#f2f4ed;letter-spacing:.2px}.kicker{font:700 15px ui-monospace,SFMono-Regular,Consolas,monospace;fill:#c8ef3d;letter-spacing:2px}.subtitle,.scope,.hash{font:400 16px Inter,Segoe UI,sans-serif;fill:#93a7a8}.label{font:500 18px Inter,Segoe UI,sans-serif;fill:#e8eeea}.value{font:700 16px ui-monospace,SFMono-Regular,Consolas,monospace;fill:#f2f4ed}.summary-label{font:500 14px Inter,Segoe UI,sans-serif;fill:#93a7a8;text-transform:uppercase;letter-spacing:1px}.summary-value{font:700 25px ui-monospace,SFMono-Regular,Consolas,monospace;fill:#c8ef3d}.expected{fill:#2a3b3d}.matched{fill:#c8ef3d}.rule{stroke:#365052;stroke-width:1}
  </style>
  <rect width="1500" height="790" fill="#091314"/>
  <rect width="1500" height="790" fill="url(#grid)" opacity=".65"/>
  <rect x="44" y="34" width="1412" height="722" fill="#091314" opacity=".94" stroke="#365052"/>
  <text x="80" y="78" class="kicker">MAINTAINED SYNTHETIC FIXTURES</text>
  <text x="80" y="126" class="title">Fixed detector regression coverage</text>
  <text x="80" y="158" class="subtitle">Filled bar = matched expected finding · scale ends at two findings · this is not an accuracy estimate</text>
  <path d="M80 178H1420" class="rule"/>
  <g><g>
        <text x="80" y="204" class="label">Email pattern</text>
        <rect x="310" y="185" width="250" height="22" rx="2" class="expected"/>
        <rect x="310" y="185" width="250" height="22" rx="2" class="matched"/>
        <text x="580" y="204" class="value">2/2</text>
      </g><g>
        <text x="80" y="276" class="label">Malaysian mobile</text>
        <rect x="310" y="257" width="125" height="22" rx="2" class="expected"/>
        <rect x="310" y="257" width="125" height="22" rx="2" class="matched"/>
        <text x="580" y="276" class="value">1/1</text>
      </g><g>
        <text x="80" y="348" class="label">NRIC-like pattern</text>
        <rect x="310" y="329" width="125" height="22" rx="2" class="expected"/>
        <rect x="310" y="329" width="125" height="22" rx="2" class="matched"/>
        <text x="580" y="348" class="value">1/1</text>
      </g><g>
        <text x="80" y="420" class="label">IPv4 pattern</text>
        <rect x="310" y="401" width="250" height="22" rx="2" class="expected"/>
        <rect x="310" y="401" width="250" height="22" rx="2" class="matched"/>
        <text x="580" y="420" class="value">2/2</text>
      </g><g>
        <text x="80" y="492" class="label">Exact duplicate</text>
        <rect x="310" y="473" width="125" height="22" rx="2" class="expected"/>
        <rect x="310" y="473" width="125" height="22" rx="2" class="matched"/>
        <text x="580" y="492" class="value">1/1</text>
      </g><g>
        <text x="80" y="564" class="label">Near duplicate</text>
        <rect x="310" y="545" width="125" height="22" rx="2" class="expected"/>
        <rect x="310" y="545" width="125" height="22" rx="2" class="matched"/>
        <text x="580" y="564" class="value">1/1</text>
      </g></g><g><g>
        <text x="790" y="204" class="label">Split leakage</text>
        <rect x="1020" y="185" width="125" height="22" rx="2" class="expected"/>
        <rect x="1020" y="185" width="125" height="22" rx="2" class="matched"/>
        <text x="1290" y="204" class="value">1/1</text>
      </g><g>
        <text x="790" y="276" class="label">Conflicting label</text>
        <rect x="1020" y="257" width="125" height="22" rx="2" class="expected"/>
        <rect x="1020" y="257" width="125" height="22" rx="2" class="matched"/>
        <text x="1290" y="276" class="value">1/1</text>
      </g><g>
        <text x="790" y="348" class="label">Class imbalance</text>
        <rect x="1020" y="329" width="125" height="22" rx="2" class="expected"/>
        <rect x="1020" y="329" width="125" height="22" rx="2" class="matched"/>
        <text x="1290" y="348" class="value">1/1</text>
      </g><g>
        <text x="790" y="420" class="label">Missing provenance</text>
        <rect x="1020" y="401" width="250" height="22" rx="2" class="expected"/>
        <rect x="1020" y="401" width="250" height="22" rx="2" class="matched"/>
        <text x="1290" y="420" class="value">2/2</text>
      </g><g>
        <text x="790" y="492" class="label">Missing licence</text>
        <rect x="1020" y="473" width="250" height="22" rx="2" class="expected"/>
        <rect x="1020" y="473" width="250" height="22" rx="2" class="matched"/>
        <text x="1290" y="492" class="value">2/2</text>
      </g></g>
  <path d="M80 646H1420" class="rule"/>
  <g>
    <text x="80" y="682" class="summary-label">Expected matched</text><text x="80" y="718" class="summary-value">15/15</text>
    <text x="350" y="682" class="summary-label">Unexpected</text><text x="350" y="718" class="summary-value">0</text>
    <text x="570" y="682" class="summary-label">Missed</text><text x="570" y="718" class="summary-value">0</text>
    <text x="760" y="682" class="summary-label">Clean rows flagged</text><text x="760" y="718" class="summary-value">0/10</text>
  </g>
  <text x="1420" y="692" text-anchor="end" class="hash">input 8540c2419466 · gold 69eb48c4e568</text>
  <text x="1420" y="720" text-anchor="end" class="scope">dtg-fixed-regression-v1 v1.0.0</text>
</svg>
